<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>map editor / 66646</title>
  <style>
    @font-face {
      font-family: 'CustomFont';
      src: url('font.ttf') format('truetype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0a0a0a;
      --panel:    #111;
      --border:   #222;
      --accent:   #c8ff00;
      --red:      #ff3333;
      --blue:     #33aaff;
      --dim:      #444;
      --text:     #ccc;
      --text-dim: #555;
      --font:     'CustomFont', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      width: 100vw; height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── LEFT TOOLBAR ── */
    #toolbar {
      width: 52px; height: 100vh;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center;
      padding: 10px 0; gap: 4px;
      z-index: 20; flex-shrink: 0;
    }

    .tool-btn {
      width: 36px; height: 36px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.1s; font-size: 16px; position: relative;
    }
    .tool-btn:hover { border-color: var(--dim); color: var(--text); }
    .tool-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,255,0,0.05); }

    .tool-sep { width: 24px; height: 1px; background: var(--border); margin: 4px 0; }

    .tool-btn[title]:hover::after {
      content: attr(title);
      position: absolute; left: 44px; top: 50%; transform: translateY(-50%);
      background: #1a1a1a; border: 1px solid var(--border);
      color: var(--text); font-size: 10px; padding: 3px 7px;
      white-space: nowrap; pointer-events: none; z-index: 100; letter-spacing: 2px;
    }

    /* ── CANVAS AREA ── */
    #canvas-wrap {
      flex: 1; position: relative; overflow: hidden; background: #050505;
    }
    #main-canvas {
      position: absolute; top: 0; left: 0;
      cursor: crosshair; image-rendering: pixelated;
    }

    /* ── RIGHT PANEL ── */
    #right-panel {
      width: 224px; height: 100vh;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0; z-index: 20; overflow: hidden;
    }

    .panel-section {
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
    }

    .panel-title {
      font-size: 9px; letter-spacing: 4px;
      color: var(--text-dim);
      text-transform: uppercase; margin-bottom: 10px;
    }

    .prop-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .prop-label {
      font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
      white-space: nowrap; flex-shrink: 0;
    }
    .prop-input {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font); font-size: 11px;
      padding: 3px 5px; width: 100%; outline: none;
      letter-spacing: 1px; transition: border-color 0.15s;
    }
    .prop-input:focus { border-color: var(--accent); }
    .prop-input[type=color] {
      padding: 1px 2px; width: 34px; height: 22px;
      cursor: pointer; flex-shrink: 0;
    }
    .prop-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
    .prop-grid2 .prop-row { margin: 0; }

    /* texture */
    #tex-preview-wrap {
      width: 100%; height: 80px;
      background: #0d0d0d;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative; margin-bottom: 6px;
      image-rendering: pixelated;
    }
    #tex-preview {
      max-width: 100%; max-height: 100%;
      image-rendering: pixelated; display: none;
    }
    #tex-none-label { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); }
    #tex-remove {
      position: absolute; top: 3px; right: 3px;
      background: rgba(0,0,0,0.8); border: 1px solid var(--red);
      color: var(--red); font-family: var(--font);
      font-size: 8px; letter-spacing: 1px; padding: 2px 5px;
      cursor: pointer; display: none;
    }
    #tex-remove:hover { background: var(--red); color: #000; }

    /* layer list */
    #layer-list {
      flex: 1; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .layer-item {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; cursor: pointer;
      border-bottom: 1px solid #141414;
      font-size: 10px; letter-spacing: 1px;
      transition: background 0.1s;
    }
    .layer-item:hover { background: #161616; }
    .layer-item.selected { background: rgba(200,255,0,0.06); color: var(--accent); }
    .layer-dot { width: 8px; height: 8px; flex-shrink: 0; }
    .layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .layer-del {
      color: var(--red); cursor: pointer; font-size: 11px;
      opacity: 0; transition: opacity 0.1s;
      background: none; border: none; font-family: var(--font);
    }
    .layer-item:hover .layer-del { opacity: 1; }

    .type-tag {
      font-size: 8px; letter-spacing: 2px;
      padding: 1px 4px; border: 1px solid; flex-shrink: 0;
    }
    .type-tag.collider { border-color: var(--red); color: var(--red); }
    .type-tag.object   { border-color: var(--blue); color: var(--blue); }

    .act-btn {
      width: 100%; padding: 7px 0;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); font-family: var(--font);
      font-size: 9px; letter-spacing: 3px;
      cursor: pointer; transition: all 0.15s;
      text-transform: lowercase; margin-bottom: 5px;
    }
    .act-btn:hover { border-color: var(--accent); color: var(--accent); }
    .act-btn.danger:hover { border-color: var(--red); color: var(--red); }
    .act-btn.primary { border-color: var(--accent); color: var(--accent); }
    .act-btn:last-child { margin-bottom: 0; }

    .toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .toggle {
      width: 28px; height: 14px; background: var(--border);
      position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: ''; position: absolute;
      width: 10px; height: 10px; background: #000;
      top: 2px; left: 2px; transition: left 0.2s;
    }
    .toggle.on::after { left: 16px; }
    .toggle-label { font-size: 9px; letter-spacing: 2px; }

    #bottom-bar {
      height: 28px; background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 12px; gap: 16px;
      font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
      position: absolute; bottom: 0; left: 52px; right: 224px; z-index: 20;
    }
    #bottom-bar span { color: var(--text); }

    #hint {
      position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
      font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
      pointer-events: none; z-index: 30; transition: opacity 1s;
    }

    #save-flash {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(200,255,0,0.1); border: 1px solid var(--accent);
      color: var(--accent); font-size: 10px; letter-spacing: 3px;
      padding: 6px 16px; pointer-events: none; z-index: 50;
      opacity: 0; transition: opacity 0.3s;
    }
  </style>
</head>
<body>

<script>
/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const canvas = document.getElementById('main-canvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');
ctx.imageSmoothingEnabled = false;

let worldW = 1280, worldH = 720;
let camX = 0, camY = 0, zoom = 1;

let objects    = [];
let nextId     = 1;
let selectedId = null;
let texCache   = {};       // id -> HTMLImageElement

let tool = 'select';

let drawing = false, drawStart = null, drawCurrent = null;
let panning = false, panStart = null, camAtPan = null;
let dragging = false, dragStart = null, objAtDrag = null;
let resizing = false, resizeHandle = null, resizeStart = null, objAtResize = null;

let gridSize = 32, showGrid = true, snapGrid = true;
let history  = [], future  = [];

/* ══════════════════════════════════════════
   RESIZE
══════════════════════════════════════════ */
function resizeCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight - 28;
  ctx.imageSmoothingEnabled = false;
  render();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
fitWorld();

function fitWorld() {
  zoom = Math.min((wrap.clientWidth-40)/worldW, (wrap.clientHeight-56)/worldH, 1);
  camX = wrap.clientWidth/2 - worldW*zoom/2;
  camY = (wrap.clientHeight-28)/2 - worldH*zoom/2;
  render();
}

/* ══════════════════════════════════════════
   TRANSFORMS
══════════════════════════════════════════ */
function screenToWorld(sx, sy) { return { x:(sx-camX)/zoom, y:(sy-camY)/zoom }; }
function snap(v) { return snapGrid ? Math.round(v/gridSize)*gridSize : Math.round(v); }

/* ══════════════════════════════════════════
   TEXTURES
══════════════════════════════════════════ */
function ensureTexture(obj) {
  if (obj.texture && !texCache[obj.id]) {
    const img = new Image();
    img.src = obj.texture;
    img.onload = () => render();
    texCache[obj.id] = img;
  }
}

function hexToRgba(hex, a) {
  hex = (hex||'#888888').replace('#','');
  if (hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return `rgba(${parseInt(hex.slice(0,2),16)},${parseInt(hex.slice(2,4),16)},${parseInt(hex.slice(4,6),16)},${a??1})`;
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function render() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle='#0d0d0d';
  ctx.fillRect(camX,camY,worldW*zoom,worldH*zoom);

  // scanlines hint
  if (zoom > 0.2) {
    ctx.fillStyle='rgba(255,255,255,0.012)';
    for (let y=0;y<worldH;y+=4) ctx.fillRect(camX, camY+y*zoom, worldW*zoom, 1);
  }

  // grid
  if (showGrid && zoom>0.15) {
    ctx.strokeStyle='#191919'; ctx.lineWidth=0.5;
    for (let wx=0;wx<=worldW;wx+=gridSize) {
      const sx=camX+wx*zoom;
      ctx.beginPath(); ctx.moveTo(sx,camY); ctx.lineTo(sx,camY+worldH*zoom); ctx.stroke();
    }
    for (let wy=0;wy<=worldH;wy+=gridSize) {
      const sy=camY+wy*zoom;
      ctx.beginPath(); ctx.moveTo(camX,sy); ctx.lineTo(camX+worldW*zoom,sy); ctx.stroke();
    }
  }

  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
  ctx.strokeRect(camX,camY,worldW*zoom,worldH*zoom);

  const sorted=[...objects].sort((a,b)=>(a.z||0)-(b.z||0));
  for (const obj of sorted) drawObject(obj, obj.id===selectedId);

  // draw preview
  if (drawing && drawStart && drawCurrent) {
    const rx=Math.min(drawStart.x,drawCurrent.x), ry=Math.min(drawStart.y,drawCurrent.y);
    const rw=Math.abs(drawCurrent.x-drawStart.x), rh=Math.abs(drawCurrent.y-drawStart.y);
    const sx=camX+rx*zoom, sy=camY+ry*zoom, sw=rw*zoom, sh=rh*zoom;
    const col=tool==='collider'?'#ff3333':'#33aaff';
    ctx.fillStyle=col+'22'; ctx.fillRect(sx,sy,sw,sh);
    ctx.strokeStyle=col; ctx.lineWidth=1;
    ctx.setLineDash(tool==='collider'?[4,3]:[]);
    ctx.strokeRect(sx,sy,sw,sh); ctx.setLineDash([]);
    if (sw>30&&sh>14) {
      ctx.fillStyle=col;
      ctx.font=`${Math.max(9,10*zoom)}px monospace`;
      ctx.fillText(`${Math.round(rw)}×${Math.round(rh)}`,sx+4,sy+12);
    }
  }

  updateStatusBar();
}

function drawObject(obj, selected) {
  const sx=camX+obj.x*zoom, sy=camY+obj.y*zoom;
  const sw=obj.w*zoom, sh=obj.h*zoom;
  const alpha=obj.opacity??( obj.type==='collider'?0.3:0.7 );

  ctx.save();

  if (obj.type==='collider') {
    ctx.fillStyle=hexToRgba(obj.color||'#ff3333', alpha);
    ctx.fillRect(sx,sy,sw,sh);
    ctx.strokeStyle=obj.color||'#ff3333'; ctx.lineWidth=selected?1.5:1;
    ctx.setLineDash([4,3]); ctx.strokeRect(sx+.5,sy+.5,sw-1,sh-1); ctx.setLineDash([]);
    if (zoom>0.3&&sw>20) {
      ctx.fillStyle=obj.color||'#ff3333';
      ctx.font=`${Math.max(8,9*zoom)}px monospace`;
      ctx.globalAlpha=0.7; ctx.fillText(obj.name||'collider',sx+3,sy+11); ctx.globalAlpha=1;
    }
  } else {
    const img=texCache[obj.id];
    if (img&&img.complete&&img.naturalWidth>0) {
      ctx.globalAlpha=alpha; ctx.imageSmoothingEnabled=false;
      ctx.drawImage(img,sx,sy,sw,sh); ctx.globalAlpha=1;
    } else {
      ctx.fillStyle=hexToRgba(obj.color||'#33aaff',alpha);
      ctx.fillRect(sx,sy,sw,sh);
      if (zoom>0.3&&sw>20) {
        ctx.fillStyle='#fff'; ctx.font=`${Math.max(8,9*zoom)}px monospace`;
        ctx.globalAlpha=0.45; ctx.fillText(obj.name||'object',sx+3,sy+11); ctx.globalAlpha=1;
      }
    }
    ctx.strokeStyle=selected?'#c8ff00':(obj.color||'#33aaff');
    ctx.lineWidth=selected?1.5:0.8;
    ctx.strokeRect(sx+.5,sy+.5,sw-1,sh-1);
  }

  if (selected) {
    ctx.strokeStyle='#c8ff00'; ctx.lineWidth=1;
    ctx.strokeRect(sx-1,sy-1,sw+2,sh+2);
    for (const h of getHandles(obj)) {
      const hsx=camX+h.wx*zoom, hsy=camY+h.wy*zoom;
      ctx.fillStyle='#c8ff00'; ctx.fillRect(hsx-4,hsy-4,8,8);
      ctx.strokeStyle='#000'; ctx.lineWidth=0.5; ctx.strokeRect(hsx-4,hsy-4,8,8);
    }
  }
  ctx.restore();
}

function getHandles(obj) {
  const cx=obj.x+obj.w/2, cy=obj.y+obj.h/2;
  return [
    {id:'nw',wx:obj.x,       wy:obj.y       },
    {id:'n', wx:cx,          wy:obj.y       },
    {id:'ne',wx:obj.x+obj.w, wy:obj.y       },
    {id:'e', wx:obj.x+obj.w, wy:cy          },
    {id:'se',wx:obj.x+obj.w, wy:obj.y+obj.h },
    {id:'s', wx:cx,          wy:obj.y+obj.h },
    {id:'sw',wx:obj.x,       wy:obj.y+obj.h },
    {id:'w', wx:obj.x,       wy:cy          },
  ];
}

/* ══════════════════════════════════════════
   HIT TEST
══════════════════════════════════════════ */
function hitTestHandle(wx,wy) {
  const sel=objects.find(o=>o.id===selectedId); if(!sel) return null;
  const t=8/zoom;
  for (const h of getHandles(sel)) if(Math.abs(wx-h.wx)<t&&Math.abs(wy-h.wy)<t) return h.id;
  return null;
}
function hitTestObjects(wx,wy) {
  const s=[...objects].sort((a,b)=>(b.z||0)-(a.z||0));
  for (const o of s) if(wx>=o.x&&wx<=o.x+o.w&&wy>=o.y&&wy<=o.y+o.h) return o.id;
  return null;
}

/* ══════════════════════════════════════════
   MOUSE
══════════════════════════════════════════ */
canvas.addEventListener('mousedown', e => {
  const wp=screenToWorld(e.offsetX,e.offsetY);
  if (e.button===1||(e.button===0&&tool==='move')) {
    panning=true; panStart={x:e.clientX,y:e.clientY}; camAtPan={x:camX,y:camY};
    canvas.style.cursor='grabbing'; return;
  }
  if (e.button!==0) return;

  if (tool==='select') {
    const handle=hitTestHandle(wp.x,wp.y);
    if (handle) {
      saveHistory(); resizing=true; resizeHandle=handle;
      resizeStart={wx:wp.x,wy:wp.y};
      objAtResize={...objects.find(o=>o.id===selectedId)}; return;
    }
    const hit=hitTestObjects(wp.x,wp.y);
    if (hit!==null) {
      selectedId=hit; saveHistory();
      dragging=true; dragStart={wx:wp.x,wy:wp.y};
      objAtDrag={...objects.find(o=>o.id===hit)};
    } else { selectedId=null; }
    updatePropsPanel(); updateLayerList(); render(); return;
  }

  if (tool==='collider'||tool==='object') {
    drawing=true;
    drawStart={x:snap(wp.x),y:snap(wp.y)};
    drawCurrent={...drawStart};
  }
});

canvas.addEventListener('mousemove', e => {
  const wp=screenToWorld(e.offsetX,e.offsetY);
  document.getElementById('pos-display').textContent=`x:${Math.round(wp.x)} y:${Math.round(wp.y)}`;

  if (tool==='select') {
    const handle=hitTestHandle(wp.x,wp.y);
    const cursors={nw:'nw-resize',n:'n-resize',ne:'ne-resize',e:'e-resize',se:'se-resize',s:'s-resize',sw:'sw-resize',w:'w-resize'};
    canvas.style.cursor=handle?(cursors[handle]||'crosshair'):'default';
  }

  if (panning) { camX=camAtPan.x+(e.clientX-panStart.x); camY=camAtPan.y+(e.clientY-panStart.y); render(); return; }

  if (resizing) {
    const obj=objects.find(o=>o.id===selectedId); if(!obj) return;
    const dx=snap(wp.x)-snap(resizeStart.wx), dy=snap(wp.y)-snap(resizeStart.wy);
    const o=objAtResize;
    let nx=o.x,ny=o.y,nw=o.w,nh=o.h;
    if(resizeHandle.includes('w')){nx=snap(o.x+dx);nw=Math.max(4,o.w-dx);}
    if(resizeHandle.includes('e')){nw=Math.max(4,o.w+dx);}
    if(resizeHandle.includes('n')){ny=snap(o.y+dy);nh=Math.max(4,o.h-dy);}
    if(resizeHandle.includes('s')){nh=Math.max(4,o.h+dy);}
    obj.x=nx;obj.y=ny;obj.w=nw;obj.h=nh; updatePropsPanel(); render(); return;
  }

  if (dragging) {
    const obj=objects.find(o=>o.id===selectedId); if(!obj) return;
    const dx=snap(wp.x)-snap(dragStart.wx), dy=snap(wp.y)-snap(dragStart.wy);
    obj.x=snap(objAtDrag.x+dx); obj.y=snap(objAtDrag.y+dy);
    updatePropsPanel(); render(); return;
  }

  if (drawing) { drawCurrent={x:snap(wp.x),y:snap(wp.y)}; render(); }
});

canvas.addEventListener('mouseup', () => {
  if (panning) { panning=false; canvas.style.cursor=tool==='select'?'default':'crosshair'; return; }
  resizing=false; dragging=false;
  if (drawing&&drawStart&&drawCurrent) {
    const rx=Math.min(drawStart.x,drawCurrent.x), ry=Math.min(drawStart.y,drawCurrent.y);
    const rw=Math.abs(drawCurrent.x-drawStart.x), rh=Math.abs(drawCurrent.y-drawStart.y);
    if (rw>=4&&rh>=4) {
      saveHistory();
      const obj={id:nextId++,type:tool,name:`${tool}_${nextId-1}`,
        x:rx,y:ry,w:rw,h:rh,
        color:tool==='collider'?'#ff3333':'#33aaff',
        opacity:tool==='collider'?0.3:0.7,
        z:tool==='collider'?10:0, texture:null};
      objects.push(obj);
      selectedId=obj.id; updatePropsPanel(); updateLayerList();
    }
    drawing=false; drawStart=null; drawCurrent=null; render();
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.9;
  const wx=(e.offsetX-camX)/zoom, wy=(e.offsetY-camY)/zoom;
  zoom=Math.max(0.05,Math.min(8,zoom*f));
  camX=e.offsetX-wx*zoom; camY=e.offsetY-wy*zoom; render();
},{passive:false});

/* ══════════════════════════════════════════
   KEYBOARD
══════════════════════════════════════════ */
window.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT') return;
  if(e.key==='v'||e.key==='V') setTool('select');
  if(e.key==='c'||e.key==='C') setTool('collider');
  if(e.key==='o'||e.key==='O') setTool('object');
  if(e.key==='h'||e.key==='H') setTool('move');
  if(e.key==='f'||e.key==='F') fitWorld();
  if(e.key==='+'||e.key==='='){zoom=Math.min(8,zoom*1.2);render();}
  if(e.key==='-'){zoom=Math.max(0.05,zoom/1.2);render();}
  if((e.key==='Delete'||e.key==='Backspace')&&selectedId!==null) deleteSelected();
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&(e.key==='y'||e.key==='Z')){e.preventDefault();redo();}
  if(e.ctrlKey&&e.key==='s'){e.preventDefault();saveToFile();}

  const sel=objects.find(o=>o.id===selectedId);
  if(sel){
    const step=e.shiftKey?gridSize:1; let moved=false;
    if(e.key==='ArrowLeft'){saveHistory();sel.x-=step;moved=true;}
    if(e.key==='ArrowRight'){saveHistory();sel.x+=step;moved=true;}
    if(e.key==='ArrowUp'){saveHistory();sel.y-=step;moved=true;}
    if(e.key==='ArrowDown'){saveHistory();sel.y+=step;moved=true;}
    if(moved){updatePropsPanel();render();e.preventDefault();}
  }
});

let spaceDown=false;
window.addEventListener('keydown',e=>{if(e.code==='Space'&&e.target.tagName!=='INPUT'){e.preventDefault();if(!spaceDown){spaceDown=true;canvas.style.cursor='grab';}}});
window.addEventListener('keyup',e=>{if(e.code==='Space'){spaceDown=false;canvas.style.cursor=tool==='select'?'default':'crosshair';}});
canvas.addEventListener('mousedown',e=>{if(spaceDown&&e.button===0){panning=true;panStart={x:e.clientX,y:e.clientY};camAtPan={x:camX,y:camY};canvas.style.cursor='grabbing';}},true);

/* ══════════════════════════════════════════
   TOOLS
══════════════════════════════════════════ */
function setTool(t) {
  tool=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  const map={select:'btn-select',collider:'btn-collider',object:'btn-object',move:'btn-move'};
  if(map[t]) document.getElementById(map[t]).classList.add('active');
  canvas.style.cursor=t==='select'?'default':t==='move'?'grab':'crosshair';
}
['select','collider','object','move'].forEach(t=>{
  document.getElementById('btn-'+t).addEventListener('click',()=>setTool(t));
});
document.getElementById('btn-zoom-in').addEventListener('click',()=>{zoom=Math.min(8,zoom*1.3);render();});
document.getElementById('btn-zoom-out').addEventListener('click',()=>{zoom=Math.max(0.05,zoom/1.3);render();});
document.getElementById('btn-zoom-fit').addEventListener('click',fitWorld);
document.getElementById('btn-undo').addEventListener('click',undo);
document.getElementById('btn-redo').addEventListener('click',redo);

/* ══════════════════════════════════════════
   UNDO / REDO
   Textures are large; we store only a flag
   and re-link from the live cache on restore.
══════════════════════════════════════════ */
function stateSnapshot() {
  return objects.map(o=>({...o,texture:o.texture?'__tex__':null}));
}
function saveHistory() {
  history.push(JSON.stringify(stateSnapshot()));
  future=[]; if(history.length>60) history.shift();
}
function applySnapshot(snap) {
  objects=snap.map(s=>{
    const live=texCache[s.id] ? objects.find(o=>o.id===s.id) : null;
    return {...s, texture: s.texture==='__tex__' ? (live?.texture||null) : null};
  });
  for(const o of objects) ensureTexture(o);
}
function undo(){if(!history.length)return;future.push(JSON.stringify(stateSnapshot()));applySnapshot(JSON.parse(history.pop()));selectedId=null;updatePropsPanel();updateLayerList();render();}
function redo(){if(!future.length)return;history.push(JSON.stringify(stateSnapshot()));applySnapshot(JSON.parse(future.pop()));selectedId=null;updatePropsPanel();updateLayerList();render();}

/* ══════════════════════════════════════════
   PROPERTIES
══════════════════════════════════════════ */
function updatePropsPanel() {
  const form=document.getElementById('props-form');
  const empty=document.getElementById('props-empty');
  const texSec=document.getElementById('tex-section');
  const sel=objects.find(o=>o.id===selectedId);
  if(!sel){form.style.display='none';empty.style.display='block';return;}
  form.style.display='block'; empty.style.display='none';
  document.getElementById('p-name').value   =sel.name||'';
  document.getElementById('p-x').value      =Math.round(sel.x);
  document.getElementById('p-y').value      =Math.round(sel.y);
  document.getElementById('p-w').value      =Math.round(sel.w);
  document.getElementById('p-h').value      =Math.round(sel.h);
  document.getElementById('p-color').value  =sel.color||'#33aaff';
  document.getElementById('p-opacity').value=sel.opacity??0.7;
  document.getElementById('p-z').value      =sel.z||0;
  texSec.style.display=sel.type==='object'?'block':'none';
  refreshTexPreview(sel);
}

function refreshTexPreview(sel) {
  const preview=document.getElementById('tex-preview');
  const none   =document.getElementById('tex-none-label');
  const rmBtn  =document.getElementById('tex-remove');
  if(sel&&sel.texture){
    preview.src=sel.texture; preview.style.display='block';
    none.style.display='none'; rmBtn.style.display='block';
  } else {
    preview.style.display='none'; none.style.display='block'; rmBtn.style.display='none';
  }
}

function bindProp(id,field,parser){
  document.getElementById(id).addEventListener('input',function(){
    const sel=objects.find(o=>o.id===selectedId); if(!sel) return;
    sel[field]=parser?parser(this.value):this.value;
    updateLayerList(); render();
  });
}
bindProp('p-name','name');
bindProp('p-x','x',parseFloat);
bindProp('p-y','y',parseFloat);
bindProp('p-w','w',v=>Math.max(1,parseFloat(v)));
bindProp('p-h','h',v=>Math.max(1,parseFloat(v)));
bindProp('p-color','color');
bindProp('p-opacity','opacity',parseFloat);
bindProp('p-z','z',parseInt);

document.getElementById('btn-delete-sel').addEventListener('click',deleteSelected);
function deleteSelected(){
  if(selectedId===null) return;
  saveHistory(); delete texCache[selectedId];
  objects=objects.filter(o=>o.id!==selectedId);
  selectedId=null; updatePropsPanel(); updateLayerList(); render();
}

/* ══════════════════════════════════════════
   TEXTURE UPLOAD
══════════════════════════════════════════ */
document.getElementById('btn-tex-upload').addEventListener('click',()=>document.getElementById('tex-file').click());

document.getElementById('tex-file').addEventListener('change',function(){
  const file=this.files[0]; if(!file) return;
  const sel=objects.find(o=>o.id===selectedId); if(!sel) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    sel.texture=ev.target.result;
    const img=new Image(); img.src=sel.texture;
    img.onload=()=>render();
    texCache[sel.id]=img;
    refreshTexPreview(sel); render();
  };
  reader.readAsDataURL(file); this.value='';
});

document.getElementById('tex-remove').addEventListener('click',()=>{
  const sel=objects.find(o=>o.id===selectedId); if(!sel) return;
  sel.texture=null; delete texCache[sel.id];
  refreshTexPreview(sel); render();
});

/* ══════════════════════════════════════════
   LAYER LIST
══════════════════════════════════════════ */
function updateLayerList(){
  const list=document.getElementById('layer-list');
  document.getElementById('layer-count').textContent=objects.length;
  document.getElementById('count-display').textContent=`${objects.length} объект${objects.length===1?'':'ов'}`;
  list.innerHTML='';
  const sorted=[...objects].sort((a,b)=>(b.z||0)-(a.z||0));
  for(const obj of sorted){
    const div=document.createElement('div');
    div.className='layer-item'+(obj.id===selectedId?' selected':'');
    div.innerHTML=`
      <div class="layer-dot" style="background:${obj.color||'#888'}"></div>
      <span class="type-tag ${obj.type}">${obj.type==='collider'?'col':'obj'}</span>
      <span class="layer-name">${obj.texture?'▣ ':''}${obj.name||obj.type}</span>
      <button class="layer-del">✕</button>
    `;
    div.addEventListener('click',ev=>{
      if(ev.target.classList.contains('layer-del')) return;
      selectedId=obj.id; updatePropsPanel(); updateLayerList(); render();
    });
    div.querySelector('.layer-del').addEventListener('click',()=>{
      saveHistory(); delete texCache[obj.id];
      objects=objects.filter(o=>o.id!==obj.id);
      if(selectedId===obj.id){selectedId=null;updatePropsPanel();}
      updateLayerList(); render();
    });
    list.appendChild(div);
  }
}

/* ══════════════════════════════════════════
   GRID
══════════════════════════════════════════ */
document.getElementById('grid-toggle').addEventListener('click',function(){showGrid=!showGrid;this.classList.toggle('on',showGrid);render();});
document.getElementById('snap-toggle').addEventListener('click',function(){snapGrid=!snapGrid;this.classList.toggle('on',snapGrid);});
document.getElementById('grid-size').addEventListener('input',function(){gridSize=Math.max(4,parseInt(this.value)||32);render();});

function updateStatusBar(){ document.getElementById('zoom-display').textContent=Math.round(zoom*100)+'%'; }

/* ══════════════════════════════════════════
   SAVE / LOAD
══════════════════════════════════════════ */
function buildMapData(){
  return {
    version:1, world:{w:worldW,h:worldH},
    objects:objects.map(o=>({
      id:o.id, type:o.type, name:o.name,
      x:Math.round(o.x), y:Math.round(o.y), w:Math.round(o.w), h:Math.round(o.h),
      color:o.color, opacity:o.opacity, z:o.z||0,
      texture:o.texture||null
    }))
  };
}

function saveToFile(){
  const blob=new Blob([JSON.stringify(buildMapData(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='map.json'; a.click();
  const f=document.getElementById('save-flash');
  f.style.opacity='1'; setTimeout(()=>f.style.opacity='0',1600);
}

function importMapData(data){
  texCache={};
  objects=(data.objects||[]).map(o=>({...o}));
  nextId=Math.max(0,...objects.map(o=>o.id||0))+1;
  if(data.world){worldW=data.world.w;worldH=data.world.h;}
  for(const obj of objects) ensureTexture(obj);
  selectedId=null; updatePropsPanel(); updateLayerList(); fitWorld();
}

async function loadFromServer(){
  try {
    const res=await fetch('map.json?_='+Date.now());
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    importMapData(await res.json());
  } catch(e){ alert('Не удалось загрузить map.json: '+e.message); }
}

document.getElementById('btn-save').addEventListener('click',saveToFile);
document.getElementById('btn-load').addEventListener('click',()=>{
  if(!objects.length||confirm('Загрузить с сервера? Несохранённые изменения будут потеряны.'))
    loadFromServer();
});
document.getElementById('btn-clear').addEventListener('click',()=>{
  if(!confirm('Очистить всё?')) return;
  saveHistory(); texCache={}; objects=[]; selectedId=null;
  updatePropsPanel(); updateLayerList(); render();
});

/* ══════════════════════════════════════════
   STARTUP
══════════════════════════════════════════ */
(async()=>{
  try {
    const res=await fetch('map.json?_='+Date.now());
    if(res.ok){const d=await res.json();if(d.objects?.length) importMapData(d);}
  }catch(e){}
})();

setTimeout(()=>{ const h=document.getElementById('hint'); h.style.opacity='0'; },5000);
updateLayerList(); updatePropsPanel(); render();
</script>
</body>
</html>
