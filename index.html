<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    @font-face {
      font-family: 'CustomFont';
      src: url('font.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'CustomFont', monospace;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── LOGIN ── */
    #login-screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    #login-screen label {
      font-family: 'CustomFont', monospace;
      font-size: 22px;
      letter-spacing: 6px;
      color: #ccc;
      text-transform: lowercase;
    }

    #code-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #555;
      color: #fff;
      font-family: 'CustomFont', monospace;
      font-size: 26px;
      padding: 6px 10px;
      outline: none;
      text-align: center;
      width: 140px;
      letter-spacing: 8px;
      transition: border-color 0.3s;
      caret-color: #fff;
    }

    #code-input.error {
      border-color: #ff3333;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    /* ── GAME ── */
    #game-screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #game-canvas {
      position: absolute;
      top: 0;
      left: 0;
      image-rendering: pixelated;
    }

    /* scanline overlay */
    #scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- background music -->
  <audio id="bg-audio" src="nihil.flac" loop preload="auto"></audio>

  <!-- login -->
  <div id="login-screen">
    <label for="code-input">код</label>
    <input type="text" id="code-input" maxlength="4" autocomplete="off" autofocus>
  </div>

  <!-- game -->
  <div id="game-screen">
    <canvas id="game-canvas"></canvas>
    <canvas id="scanlines"></canvas>
  </div>

  <script>
    /* ─────────────────────────────────────
       CONSTANTS
    ───────────────────────────────────── */
    const CODES = {
      '0101': 6,
      '2424': 5,
      '7845': 0,
      '3416': 1,
      '4523': 3,
      '3636': 2,
      '3777': 4
    };

    const SPRITE_W   = 32;
    const SPRITE_H   = 48;
    const SCALE      = 3;
    const SPEED      = 160;
    const ANIM_MS    = 320;

    /* ─────────────────────────────────────
       MAP DATA
    ───────────────────────────────────── */
    let mapColliders = [];  // { x, y, w, h }
    let mapObjects   = [];  // { x, y, w, h, color, opacity, z, texture?, name }
    let textureCache = {};  // name/id -> HTMLImageElement

    async function loadMap() {
      try {
        const res  = await fetch('map.json?_=' + Date.now());
        if (!res.ok) return;
        const data = await res.json();
        const objs = data.objects || [];

        mapColliders = objs
          .filter(o => o.type === 'collider')
          .map(o => ({ x: o.x, y: o.y, w: o.w, h: o.h }));

        mapObjects = objs
          .filter(o => o.type === 'object')
          .sort((a, b) => (a.z || 0) - (b.z || 0));

        // Pre-load textures
        for (const obj of mapObjects) {
          if (obj.texture && !textureCache[obj.id]) {
            const img = new Image();
            img.src = obj.texture;
            textureCache[obj.id] = img;
          }
        }
      } catch (e) {
        // no map.json — that's fine, world stays empty
      }
    }

    /* ─────────────────────────────────────
       AUDIO
    ───────────────────────────────────── */
    const audio = document.getElementById('bg-audio');

    function tryPlayAudio() {
      audio.play().catch(() => {});
    }

    tryPlayAudio();
    document.addEventListener('keydown', tryPlayAudio, { once: true });
    document.addEventListener('pointerdown', tryPlayAudio, { once: true });

    /* ─────────────────────────────────────
       SPRITE SHEET
    ───────────────────────────────────── */
    const spriteSheet = new Image();
    spriteSheet.src = 'players.png';

    /* ─────────────────────────────────────
       LOGIN
    ───────────────────────────────────── */
    const codeInput    = document.getElementById('code-input');
    const loginScreen  = document.getElementById('login-screen');
    const gameScreen   = document.getElementById('game-screen');
    const canvas       = document.getElementById('game-canvas');
    const ctx          = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    let charIndex = 0;

    codeInput.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      const val = this.value.trim();
      if (val in CODES) {
        charIndex = CODES[val];
        startGame();
      } else {
        this.classList.add('error');
        this.value = '';
        setTimeout(() => this.classList.remove('error'), 400);
      }
    });

    /* ─────────────────────────────────────
       SCANLINES
    ───────────────────────────────────── */
    const slCanvas = document.getElementById('scanlines');
    const slCtx    = slCanvas.getContext('2d');

    let lineOffsets = [];

    function buildScanlineData() {
      lineOffsets = [];
      const h = slCanvas.height;
      let y = 0;
      while (y < h) {
        lineOffsets.push({
          y:     y,
          alpha: 0.10 + Math.random() * 0.09,
          h:     Math.random() < 0.12 ? 2 : 1
        });
        y += Math.random() < 0.3 ? 4 : 3;
      }
    }

    function resizeScanlines() {
      slCanvas.width  = window.innerWidth;
      slCanvas.height = window.innerHeight;
      buildScanlineData();
      drawScanlines();
    }

    let flickerPhase = 0;

    function drawScanlines() {
      slCtx.clearRect(0, 0, slCanvas.width, slCanvas.height);

      const cx = slCanvas.width  * 0.48;
      const cy = slCanvas.height * 0.52;
      const r  = Math.max(slCanvas.width, slCanvas.height) * 0.72;
      const vg = slCtx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(0,0,0,0.38)');
      slCtx.fillStyle = vg;
      slCtx.fillRect(0, 0, slCanvas.width, slCanvas.height);

      flickerPhase += 0.018;
      const baseFlicker  = Math.sin(flickerPhase) * 0.012;
      const spike        = (Math.random() < 0.003) ? (Math.random() * 0.06) : 0;
      const globalAlphaShift = baseFlicker + spike;

      for (let i = 0; i < lineOffsets.length; i++) {
        const ln    = lineOffsets[i];
        const extra = (Math.random() < 0.004) ? 0.07 : 0;
        slCtx.fillStyle = `rgba(0,0,0,${Math.max(0, ln.alpha + globalAlphaShift + extra)})`;
        slCtx.fillRect(0, ln.y, slCanvas.width, ln.h);
      }
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
      resizeScanlines();
    });

    /* ─────────────────────────────────────
       COLLISION
    ───────────────────────────────────── */
    // Player hitbox: bottom 60% of sprite, inset horizontally
    const HB_INSET_X = SPRITE_W * SCALE * 0.18;
    const HB_TOP_PCT = 0.55;

    function playerHitbox(px, py) {
      const dw = SPRITE_W * SCALE;
      const dh = SPRITE_H * SCALE;
      return {
        x:  px + HB_INSET_X,
        y:  py + dh * HB_TOP_PCT,
        w:  dw - HB_INSET_X * 2,
        h:  dh * (1 - HB_TOP_PCT)
      };
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w &&
             a.x + a.w > b.x &&
             a.y < b.y + b.h &&
             a.y + a.h > b.y;
    }

    function resolveCollisions(nextX, nextY, curX, curY) {
      let rx = nextX;
      let ry = nextY;

      for (const c of mapColliders) {
        // Try X only
        const hbX = playerHitbox(rx, curY);
        if (rectsOverlap(hbX, c)) {
          rx = curX;
        }

        // Try Y only
        const hbY = playerHitbox(rx, ry);
        if (rectsOverlap(hbY, c)) {
          ry = curY;
        }
      }

      return { x: rx, y: ry };
    }

    /* ─────────────────────────────────────
       DRAW MAP OBJECTS
    ───────────────────────────────────── */
    function hexToRgba(hex, alpha) {
      hex = hex || '#888888';
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha !== undefined ? alpha : 1})`;
    }

    function drawMapObjects(belowZ) {
      // belowZ = true  → draw objects with z <= 0 (behind player)
      // belowZ = false → draw objects with z >  0 (in front of player)
      ctx.save();
      ctx.imageSmoothingEnabled = false;

      for (const obj of mapObjects) {
        const isBehind = (obj.z || 0) <= 0;
        if (belowZ !== isBehind) continue;

        const alpha = obj.opacity !== undefined ? obj.opacity : 0.8;
        const img   = textureCache[obj.id];

        if (img && img.complete && img.naturalWidth > 0) {
          ctx.globalAlpha = alpha;
          ctx.drawImage(img, obj.x, obj.y, obj.w, obj.h);
          ctx.globalAlpha = 1;
        } else {
          ctx.fillStyle   = hexToRgba(obj.color, alpha);
          ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
        }
      }

      ctx.restore();
    }

    /* ─────────────────────────────────────
       GAME STATE
    ───────────────────────────────────── */
    let px, py;
    let keys        = {};
    let walkFrame   = 0;
    let walkTimer   = 0;
    let isMoving    = false;
    let facingLeft  = false;
    let lastTs      = null;

    async function startGame() {
      tryPlayAudio();
      await loadMap();

      loginScreen.style.display = 'none';
      gameScreen.style.display  = 'block';
      resizeCanvas();
      resizeScanlines();

      px = Math.floor((canvas.width  - SPRITE_W * SCALE) / 2);
      py = Math.floor((canvas.height - SPRITE_H * SCALE) / 2);

      requestAnimationFrame(gameLoop);
    }

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.imageSmoothingEnabled = false;
    }

    /* ─────────────────────────────────────
       INPUT
    ───────────────────────────────────── */
    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    /* ─────────────────────────────────────
       GAME LOOP
    ───────────────────────────────────── */
    function gameLoop(ts) {
      if (lastTs === null) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.1);
      lastTs = ts;

      let dx = 0, dy = 0;
      if (keys['ArrowLeft']  || keys['a'] || keys['A']) { dx -= 1; facingLeft = true;  }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx += 1; facingLeft = false; }
      if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
      if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;

      if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

      isMoving = (dx !== 0 || dy !== 0);

      const rawX = px + dx * SPEED * dt;
      const rawY = py + dy * SPEED * dt;

      // Clamp to canvas
      const maxX = canvas.width  - SPRITE_W * SCALE;
      const maxY = canvas.height - SPRITE_H * SCALE;
      const clampedX = Math.max(0, Math.min(maxX, rawX));
      const clampedY = Math.max(0, Math.min(maxY, rawY));

      // Resolve colliders
      const resolved = resolveCollisions(clampedX, clampedY, px, py);
      px = resolved.x;
      py = resolved.y;

      if (isMoving) {
        walkTimer += dt * 1000;
        if (walkTimer >= ANIM_MS) {
          walkTimer -= ANIM_MS;
          walkFrame = (walkFrame + 1) % 2;
        }
      } else {
        walkFrame = 0;
        walkTimer = 0;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Background objects (z <= 0)
      drawMapObjects(true);

      // Draw player
      const srcX = charIndex * SPRITE_W;
      const srcY = isMoving ? (1 + walkFrame) * SPRITE_H : 0;
      const dw   = SPRITE_W * SCALE;
      const dh   = SPRITE_H * SCALE;

      ctx.save();
      if (facingLeft) {
        ctx.translate(Math.round(px) + dw, Math.round(py));
        ctx.scale(-1, 1);
        ctx.drawImage(spriteSheet, srcX, srcY, SPRITE_W, SPRITE_H, 0, 0, dw, dh);
      } else {
        ctx.drawImage(spriteSheet, srcX, srcY, SPRITE_W, SPRITE_H,
                      Math.round(px), Math.round(py), dw, dh);
      }
      ctx.restore();

      // Foreground objects (z > 0)
      drawMapObjects(false);

      // Scanlines
      drawScanlines();

      requestAnimationFrame(gameLoop);
    }
  </script>
</body>
</html>
